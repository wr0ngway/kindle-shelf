<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'" />
  <title>Kindle Shelf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Kindle Shelf</h1>
    <div id="status" class="status">Loading…</div>
    <button id="refresh" title="Re-sync from Amazon">↻ Refresh</button>
  </header>

  <div id="login-banner" class="banner hidden">
    Your Amazon session has expired (or you haven't signed in yet).
    <button id="login">Sign in to Amazon</button>
  </div>
  <div id="error-banner" class="banner error hidden"></div>

  <input id="search" type="search" placeholder="Search by author (or title)…" autofocus />

  <div id="summary" class="summary"></div>
  <ul id="results"></ul>

  <script src="renderer.js"></script>
</body>
</html>
