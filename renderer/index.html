<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#b45309" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; img-src https: data:" />
  <title>Kindle Shelf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Kindle Shelf</h1>
    <div id="status" class="status">Loading…</div>
    <button id="remote-btn" title="Remote access (phone)">📱</button>
    <button id="refresh" title="Re-sync from Amazon">↻ Refresh</button>
  </header>

  <div id="login-banner" class="banner hidden">
    Your Amazon session has expired (or you haven't signed in yet).
    <button id="login">Sign in to Amazon</button>
  </div>
  <div id="error-banner" class="banner error hidden"></div>

  <main>
    <section id="view-library">
      <div class="controls">
        <input id="search" type="search" placeholder="Search by author, title, or series…" autofocus />
        <select id="lib-sort" title="Sort order">
          <option value="alpha">Sort: A–Z</option>
          <option value="recent">Sort: recently acquired</option>
        </select>
        <label><input type="checkbox" id="group-series" /> Group by series</label>
      </div>
      <div class="controls">
        <label class="needs-grouping"><input type="checkbox" id="lib-compact" disabled /> Compact (unread only per series)</label>
        <label class="needs-grouping"><input type="checkbox" id="lib-unread-only" disabled /> Only series with unread books</label>
        <label class="needs-grouping"><input type="checkbox" id="lib-released-only" checked disabled /> Released only</label>
      </div>
      <div id="lib-summary" class="summary"></div>
      <div id="lib-results"></div>
    </section>

    <section id="view-author" class="hidden">
      <div class="controls">
        <button id="author-back">← Back</button>
        <h2 id="author-title"></h2>
        <button id="author-refresh" title="Re-fetch from Amazon">↻</button>
        <label><input type="checkbox" id="author-unread-only" /> Unread only</label>
        <label><input type="checkbox" id="author-released-only" checked /> Released only</label>
      </div>
      <div id="author-chips" class="chips"></div>
      <div id="author-summary" class="summary"></div>
      <div id="author-results"></div>
    </section>
  </main>

  <aside id="details" class="hidden">
    <button id="details-close">✕</button>
    <div id="details-body"></div>
  </aside>

  <aside id="remote-panel" class="hidden">
    <button id="remote-close">✕</button>
    <div id="remote-body"></div>
  </aside>

  <script src="bridge.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
